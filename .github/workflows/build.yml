name: Build GrimLedger EXE

on:
  workflow_dispatch:    # Nur manuell: Actions → "Build GrimLedger EXE" → "Run workflow"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Vite + package with electron-builder
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrimLedger-Windows
          path: release/*.exe
          retention-days: 30
