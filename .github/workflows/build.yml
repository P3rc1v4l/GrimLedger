name: Build & Release GrimLedger

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Release erstellen?'
        required: false
        default: 'true'
        type: choice
        options: ['false', 'true']
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build & publish release
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only publish when input is 'true' OR when triggered by a tag push
          EP_DRAFT: false
          PUBLISH_FLAG: ${{ github.event.inputs.create_release == 'true' || github.event_name == 'push' }}

      - name: Upload EXE as artifact (always, as backup)
        uses: actions/upload-artifact@v4
        with:
          name: GrimLedger-Windows-${{ github.run_number }}
          path: release/*.exe
          retention-days: 30
