name: Build & Release GrimLedger

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Read version
        id: v
        run: |
          $ver = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: GrimLedger-Windows-v${{ steps.v.outputs.version }}
          path: release/*.exe
          retention-days: 30

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.v.outputs.version }}
          name: GrimLedger v${{ steps.v.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## GrimLedger v${{ steps.v.outputs.version }}
            Installer-EXE unten herunterladen und ausfuehren.
            Bei SmartScreen: "Weitere Informationen" dann "Trotzdem ausfuehren".
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
