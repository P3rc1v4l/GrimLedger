name: Build GrimLedger EXE

on:
  push:
    branches: [main]
  workflow_dispatch:          # lets you trigger manually from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest   # MUST be Windows to produce a proper .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + package with electron-builder
        run: npm run dist:win
        env:
          # electron-builder needs this on Windows CI
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrimLedger-Windows
          # electron-builder puts the installer in release/
          path: release/*.exe
          retention-days: 30   # artifact stays downloadable for 30 days
