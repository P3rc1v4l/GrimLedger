name: Build & Release GrimLedger

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Release erstellen?'
        required: false
        default: 'true'
        type: choice
        options: ['false', 'true']
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # Read version from package.json for the release title
      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      # Build EXE (no publish — just create the installer)
      - name: Build EXE
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload EXE as artifact (always available regardless of release)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrimLedger-Windows-v${{ steps.version.outputs.version }}
          path: release/*.exe
          retention-days: 30

      # Create GitHub Release ONLY when create_release=true or triggered by tag
      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' || github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GrimLedger v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## GrimLedger v${{ steps.version.outputs.version }}

            Lade die Installer-EXE unten herunter und führe sie aus.

            **Hinweis:** Wenn Windows SmartScreen eine Warnung zeigt, klicke auf "Weitere Informationen" → "Trotzdem ausführen".
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
