name: Build & Release GrimLedger

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Release erstellen?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Read version (PowerShell)
        id: version
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build EXE
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrimLedger-Windows-v${{ steps.version.outputs.version }}
          path: release/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' || github.event_name == 'push' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GrimLedger v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## GrimLedger v${{ steps.version.outputs.version }}

            Lade die Installer-EXE unten herunter und fuehre sie aus.

            Wenn Windows SmartScreen eine Warnung zeigt: "Weitere Informationen" -> "Trotzdem ausfuehren".
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
