name: Build & Release GrimLedger

on:
  workflow_dispatch:    # Nur manuell: Actions → "Build & Release GrimLedger" → "Run workflow"

permissions:
  contents: write       # needed to create GitHub Releases

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build & publish release
        # electron-builder reads the version from package.json,
        # creates a GitHub Release tagged v<version> and uploads the installer.
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell electron-builder to publish (creates the GitHub Release + tag)
          EP_DRAFT: false
